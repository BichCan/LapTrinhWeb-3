{% extends "base.html" %}

{% block content %}

<div class="form-container">
<h2>{{ct.mact}} - {{ct.tenct}}</h2>
<h2>Sửa thông tin học phần</h2>

<form method="POST">

<label>Số thứ tự</label>
<input type="number" name="stt" value="{{mon.stt}}" required>

<label>Chọn môn học</label>
<select id="subject" name="mahp" onchange="showInfo()" required>
{% for hp in hocphan %}
<option value="{{hp.mahp}}"
    data-code="{{hp.mahp}}"
    data-credit="{{hp.sotc}}"
    {% if hp.mahp == mon.mahp %}selected{% endif %}>
    {{hp.tenhp}}
</option>
{% endfor %}
</select>

<label>Mã học phần</label>
<input type="text" id="code" value="{{mon.mahp}}" readonly>

<label>Số tín chỉ</label>
<input type="text" id="credit" value="{{mon.sotc}}" readonly>

<label>Học kỳ</label>
<select name="hocki">
{% for i in range(1, 9) %}
<option value="{{i}}" {% if i == mon.hocki %}selected{% endif %}>Học kỳ {{i}}</option>
{% endfor %}
</select>

<button class="form-btn" type="submit">Cập nhật</button>

</form>
</div>

<script>
function showInfo(){
    let subject = document.getElementById("subject");
    let option = subject.options[subject.selectedIndex];
    document.getElementById("code").value = option.getAttribute("data-code");
    document.getElementById("credit").value = option.getAttribute("data-credit");
}
</script>

{% endblock %}
